{% extends 'base.html' %}
{% block content %}
<h2>Мои клиенты</h2>
<a href="{% url 'mailing:client_create' %}" class="btn btn-success mb-3">Добавить клиента</a>
<table class="table table-bordered">
    <thead><tr><th>Email</th><th>ФИО</th><th>Комментарий</th><th>Действия</th></tr></thead>
    <tbody>
    {% for client in clients %}
        <tr>
            <td>{{ client.email }}</td>
            <td>{{ client.full_name }}</td>
            <td>{{ client.comment|truncatechars:50 }}</td>
            <td>
                <a href="{% url 'mailing:client_update' client.pk %}" class="btn btn-sm btn-primary">Изменить</a>
                <a href="{% url 'mailing:client_delete' client.pk %}" class="btn btn-sm btn-danger">Удалить</a>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
