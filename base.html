<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сервис рассылок</title>
    {% load static %}
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Рассылки</a>
            {% if user.is_authenticated %}
                <div class="ms-auto">
                    <span class="text-white me-3">{{ user.email }}</span>
                    <a href="{% url 'mailing:client_list' %}" class="btn btn-outline-light btn-sm">Клиенты</a>
                    <a href="{% url 'mailing:message_list' %}" class="btn btn-outline-light btn-sm">Сообщения</a>
                    <a href="{% url 'mailing:mailing_list' %}" class="btn btn-outline-light btn-sm">Рассылки</a>
                    <a href="{% url 'mailing:attempt_list' %}" class="btn btn-outline-light btn-sm">Попытки</a>
                    <a href="{% url 'users:profile' %}" class="btn btn-outline-info btn-sm">Профиль</a>
                    <a href="{% url 'users:logout' %}" class="btn btn-outline-danger btn-sm">Выход</a>
                </div>
            {% else %}
                <div class="ms-auto">
                    <a href="{% url 'users:login' %}" class="btn btn-outline-light btn-sm">Вход</a>
                    <a href="{% url 'users:register' %}" class="btn btn-outline-warning btn-sm">Регистрация</a>
                </div>
            {% endif %}
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
